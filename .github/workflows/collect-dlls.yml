name: Collect Qiling Windows DLLs and Registry

on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dllscollector.bat from Qiling repo
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/qilingframework/qiling/master/examples/scripts/dllscollector.bat" -OutFile "dllscollector.bat"

      - name: Run dllscollector.bat (runner is already Administrator)
        shell: cmd
        run: |
          dllscollector.bat

      - name: Debug x86 collection
        shell: pwsh
        run: |
          Write-Host "Contenuto SysWOW64 su questo runner:"
          Get-ChildItem "C:\Windows\SysWOW64\*.dll" | Select-Object -First 10 Name
          Write-Host "---"
          Write-Host "Contenuto x86_windows destinazione:"
          if (Test-Path "examples\rootfs\x86_windows\Windows\System32") {
            Get-ChildItem "examples\rootfs\x86_windows\Windows\System32" | Select-Object -First 10 Name
          } else {
            Write-Host "CARTELLA NON ESISTE: examples\rootfs\x86_windows\Windows\System32"
          }

      - name: Verify collected files
        shell: pwsh
        run: |
          Write-Host "x64:"
          Get-ChildItem -Recurse -Path "examples\rootfs\x8664_windows\Windows" | Select-Object FullName
          Write-Host "x86:"
          Get-ChildItem -Recurse -Path "examples\rootfs\x86_windows\Windows" | Select-Object FullName
          
      - name: Zip both x86 and x64 Windows folders separately
        shell: pwsh
        run: |
          Compress-Archive -Path "examples\rootfs\x8664_windows\Windows" -DestinationPath "x64_windows.zip"
          Compress-Archive -Path "examples\rootfs\x86_windows\Windows" -DestinationPath "x86_windows.zip"
          
      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-dlls-x64
          path: x64_windows.zip
          retention-days: 3

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-dlls-x86
          path: x86_windows.zip
          retention-days: 3
